<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1a2e;
    font-family: 'Press Start 2P', monospace;
    color: #e0e0e0;
    image-rendering: pixelated;
  }

  .container {
    text-align: center;
    padding: 2rem;
  }

  h1 {
    font-size: 1.4rem;
    color: #f5c842;
    margin-bottom: 3rem;
    text-shadow: 3px 3px 0 #b8860b;
    letter-spacing: 2px;
  }

  .bounds {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2.5rem;
  }

  .bounds label {
    font-size: 0.6rem;
    color: #888;
    text-transform: uppercase;
  }

  .bound-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
  }

  .bounds input {
    width: 120px;
    padding: 0.7rem;
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    text-align: center;
    background: #16213e;
    border: 3px solid #0f3460;
    color: #e0e0e0;
    outline: none;
    transition: border-color 0.2s;
  }

  .bounds input:focus {
    border-color: #f5c842;
  }

  .separator {
    font-size: 1.2rem;
    color: #555;
    padding-top: 1.2rem;
  }

  .result-box {
    width: 260px;
    height: 120px;
    margin: 0 auto 2.5rem;
    background: #16213e;
    border: 4px solid #0f3460;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    color: #e0e0e0;
    position: relative;
    overflow: hidden;
  }

  .result-box.rolling {
    color: #666;
  }

  .result-box.landed {
    color: #f5c842;
    border-color: #f5c842;
    text-shadow: 2px 2px 0 #b8860b;
    animation: land 0.3s ease-out;
  }

  @keyframes land {
    0% { transform: scale(1.2); }
    50% { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  .result-text {
    position: relative;
    z-index: 1;
  }

  button {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.9rem;
    padding: 1rem 2.5rem;
    background: #e94560;
    color: #fff;
    border: none;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    box-shadow: 0 4px 0 #a82040;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
    top: 0;
  }

  button:hover {
    background: #ff5a78;
  }

  button:active {
    top: 4px;
    box-shadow: 0 0 0 #a82040;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.08) 2px,
      rgba(0, 0, 0, 0.08) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* pixel dust particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #f5c842;
    opacity: 0;
  }

  @keyframes float-up {
    0% {
      opacity: 0;
      transform: translateY(0) scale(1);
    }
    10% {
      opacity: 0.6;
    }
    100% {
      opacity: 0;
      transform: translateY(-200px) scale(0);
    }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">
  <h1>Random</h1>

  <div class="bounds">
    <div class="bound-group">
      <label>Min</label>
      <input type="number" id="min" value="1">
    </div>
    <span class="separator">&ndash;</span>
    <div class="bound-group">
      <label>Max</label>
      <input type="number" id="max" value="3">
    </div>
  </div>

  <div class="result-box" id="resultBox">
    <span class="result-text" id="result">?</span>
  </div>

  <button id="generate">Generate</button>
</div>

<script>
  const minInput = document.getElementById('min');
  const maxInput = document.getElementById('max');
  const resultBox = document.getElementById('resultBox');
  const resultEl = document.getElementById('result');
  const generateBtn = document.getElementById('generate');
  const particlesContainer = document.getElementById('particles');

  // Restore bounds from localStorage
  const savedMin = localStorage.getItem('random-min');
  const savedMax = localStorage.getItem('random-max');
  if (savedMin !== null) minInput.value = savedMin;
  if (savedMax !== null) maxInput.value = savedMax;

  // Persist bounds on change
  minInput.addEventListener('input', () => localStorage.setItem('random-min', minInput.value));
  maxInput.addEventListener('input', () => localStorage.setItem('random-max', maxInput.value));

  // Cryptographically secure random — uses OS entropy via Web Crypto API
  // Uniform distribution: rejection sampling eliminates modulo bias
  function randomInRange(min, max) {
    const range = max - min + 1;
    const bytesNeeded = Math.ceil(Math.log2(range) / 8) || 1;
    const maxValid = Math.floor((256 ** bytesNeeded) / range) * range;
    let value;
    do {
      const buf = new Uint8Array(bytesNeeded);
      crypto.getRandomValues(buf);
      value = 0;
      for (let i = 0; i < bytesNeeded; i++) value = value * 256 + buf[i];
    } while (value >= maxValid); // reject to avoid modulo bias
    return min + (value % range);
  }

  // --- Web Audio SFX ---
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  function playTick(progress) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    // pitch rises slightly as it slows down
    osc.type = 'square';
    osc.frequency.value = 220 + progress * 300;

    const now = audioCtx.currentTime;
    gain.gain.setValueAtTime(0.06, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);

    osc.start(now);
    osc.stop(now + 0.06);
  }

  function playLand() {
    const now = audioCtx.currentTime;

    // Chord: two oscillators for a triumphant chiptune hit
    const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
    notes.forEach((freq, i) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'square';
      osc.frequency.value = freq;

      const t = now + i * 0.04;
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

      osc.start(t);
      osc.stop(t + 0.35);
    });
  }

  function spawnParticles() {
    const box = resultBox.getBoundingClientRect();
    const cx = box.left + box.width / 2;
    const cy = box.top + box.height / 2;

    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const angle = Math.random() * Math.PI * 2;
      const dist = 30 + Math.random() * 60;
      p.style.left = (cx + Math.cos(angle) * dist) + 'px';
      p.style.top = cy + 'px';
      p.style.animation = `float-up ${0.6 + Math.random() * 0.6}s ease-out forwards`;
      p.style.animationDelay = Math.random() * 0.15 + 's';
      particlesContainer.appendChild(p);
      setTimeout(() => p.remove(), 1500);
    }
  }

  function generate() {
    const min = parseInt(minInput.value, 10);
    const max = parseInt(maxInput.value, 10);

    if (isNaN(min) || isNaN(max) || min > max) return;

    if (audioCtx.state === 'suspended') audioCtx.resume();
    generateBtn.disabled = true;
    resultBox.classList.remove('landed');
    resultBox.classList.add('rolling');

    const final = randomInRange(min, max);
    const totalDuration = 1200;
    const startTime = performance.now();

    function tick(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / totalDuration, 1);

      // Slow down: interval grows as progress increases
      const interval = 40 + progress * 200;

      if (progress < 1) {
        resultEl.textContent = randomInRange(min, max);
        playTick(progress);
        setTimeout(() => requestAnimationFrame(tick), interval);
      } else {
        // Land on final value
        resultEl.textContent = final;
        resultBox.classList.remove('rolling');
        resultBox.classList.add('landed');
        generateBtn.disabled = false;
        spawnParticles();
        playLand();
      }
    }

    requestAnimationFrame(tick);
  }

  generateBtn.addEventListener('click', generate);

  // Keyboard shortcut: Enter or Space
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement.tagName !== 'INPUT') {
      generate();
    }
  });
</script>

</body>
</html>
